repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.6   # latest release tag from GitHub
    hooks:
      - id: ruff
        # args: [--fix]
      - id: ruff-format
        args: [--check]

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4   # latest Bandit release tag
    hooks:
      - id: bandit